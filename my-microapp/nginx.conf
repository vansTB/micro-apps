# ============================================================
# qiankun 微前端 Nginx 配置（子域名方案）
# ============================================================
# 前置条件：
#   - 主应用部署在 app.example.com
#   - React 子应用部署在 react.app.example.com
#   - Vue 子应用部署在 vue.app.example.com
#   - 三个子域名都解析到同一台服务器
#   - SSL 证书建议使用通配符证书 *.example.com
# ============================================================

# ---------- 主应用 ----------
server {
    listen 8080;
    server_name app.example.com;

    # 重定向到 HTTPS（生产环境建议启用）
    # return 301 https://$host$request_uri;

    root /usr/share/nginx/html/main-app;
    index index.html;

    # SPA 路由：所有路径 fallback 到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ---------- React 子应用 ----------
server {
    listen 8081;
    server_name react.app.example.com;

    root /usr/share/nginx/html/react-child-app;
    index index.html;

    # 允许主应用跨域访问（qiankun fetch 入口 HTML 需要）
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, OPTIONS';
    add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';

    # 处理 OPTIONS 预检请求
    if ($request_method = OPTIONS) {
        return 204;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # 静态资源也需要 CORS
        add_header Access-Control-Allow-Origin *;
    }
}

# ---------- Vue 子应用 ----------
server {
    listen 8082;
    server_name vue.app.example.com;

    root /usr/share/nginx/html/vue-child-app;
    index index.html;

    # 允许主应用跨域访问
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, OPTIONS';
    add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';

    if ($request_method = OPTIONS) {
        return 204;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }
}

